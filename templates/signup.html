<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Section</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

    <h1 class="mb-4">Signup</h1>

    <form method="post" action="/signup" class="w-70">
        
        <div class="form-group row mb-3 align-items-center">
            <label for="username" class="col-sm-2 col-form-label">username:</label>
            <div class="col-sm-10">
                <input type="text" name="user_name" placeholder="Enter Your Username" class="form-control" id="user_name">
            </div>
        </div>

        <div class="form-group row mb-3 align-items-center">
            <label for="password" class="col-sm-2 col-form-label">password:</label>
            <div class="col-sm-10">
                <input type="password" name="password" placeholder="Enter Your Password" class="form-control" id="password">
            </div>
        </div>

        <div class="form-group row">
            <div class="col-sm-10 offset-sm-2 d-flex gap-2">
                <button id="submit-button" type="submit" class="btn btn-success">Sign Up</button>
            </div>
        </div>
        
    </form>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
</body>
</html>
