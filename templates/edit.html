<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Section</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">

    <h1 class="mb-4">Edit Task</h1>

    <form method="post" action="/edit/{{current_task.id}}" class="w-70">
        
        <div class="form-group row mb-3 align-items-center">
            <label for="task" class="col-sm-2 col-form-label">Task:</label>
            <div class="col-sm-10">
                <input type="text" name="task" placeholder="Enter Your Task" class="form-control" id="task" value="{{current_task.task}}">
            </div>
        </div>

        <div class="form-group row mb-4 align-items-center">
            <label for="priority" class="col-sm-2 col-form-label">Priority:</label>
            <div class="col-sm-10">
                <select name="priority" id="priority" class="form-select">
                    <option value="High" {% if current_task.priority == 'High' %} selected {% endif %}>High</option>
                    <option value="Medium" {% if current_task.priority == 'Medium' %} selected {% endif %}>Medium</option>
                    <option value="Low" {% if current_task.priority == 'Low' %} selected {% endif %}>Low</option>
                </select>
            </div>
        </div>

        <div class="form-group row">
            <div class="col-sm-10 offset-sm-2 d-flex gap-2">
                <button id="submit-button" type="submit" class="btn btn-success">Update Task</button>
                <a href="/" class="btn btn-secondary">Cancel</a>
            </div>
        </div>
        
    </form>
</body>
</html>
